name: release

on:
  push:
    branches:
      - main
      - master
      - develop
      - release/*
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+rc[0-9]+'
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  DOCKERHUB_NAMESPACE: ${{ secrets.CUSTOM_DOCKERHUB_USERNAME || github.repository_owner }}

jobs:
  build:
    name: Build ${{ matrix.project }} image
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - project: host
            image_suffix: host
          - project: dashboard
            image_suffix: dashboard

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get short commit hash
        uses: benjlevesque/short-sha@v3.0
        id: short-sha
        with:
          length: 8

      - name: Set image name
        id: image
        run: |
          echo "name=${DOCKERHUB_NAMESPACE}/kacho-ui-future-${{ matrix.image_suffix }}-${{ steps.short-sha.outputs.sha }}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.CUSTOM_DOCKERHUB_USERNAME }}
          password: ${{ secrets.CUSTOM_DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./${{ matrix.project }}/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.image.outputs.name }}
          cache-from: type=gha,scope=${{ matrix.project }}
          cache-to: type=gha,mode=max,scope=${{ matrix.project }}
