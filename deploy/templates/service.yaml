apiVersion: v1
kind: Service
metadata:
  name: {{ include "ui.hostName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ui.labels" . | nindent 4 }}
    {{- include "ui.hostSelectorLabels" . | nindent 4 }}
spec:
  selector:
    {{- include "ui.hostSelectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ include "ui.hostPort" . }}
      targetPort: http
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "ui.dashboardName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ui.labels" . | nindent 4 }}
    {{- include "ui.dashboardSelectorLabels" . | nindent 4 }}
spec:
  selector:
    {{- include "ui.dashboardSelectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.dashboard.port }}
      targetPort: http
