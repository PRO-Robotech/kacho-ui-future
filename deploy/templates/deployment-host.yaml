apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ui.hostName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ui.labels" . | nindent 4 }}
    {{- include "ui.hostSelectorLabels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ include "ui.hostReplicas" . }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "ui.hostSelectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "ui.labels" . | nindent 8 }}
        {{- include "ui.hostSelectorLabels" . | nindent 8 }}
      annotations:
        checksum/nginx: {{ include (print $.Template.BasePath "/configmap-nginx.yaml") . | sha256sum }}
    spec:
      enableServiceLinks: false
      volumes:
        - name: nginx-template-src
          configMap:
            name: {{ include "ui.hostName" . }}-nginx
            items:
              - key: default.conf.template
                path: default.conf.template
        # Writable templates dir: the configMap mount is read-only, so the resolver
        # init-script (05-*) copies the DNS-substituted template here for nginx's
        # own envsubst step (20-*) to read — an in-place `sed -i` on the read-only
        # subPath mount fails with "Resource busy".
        - name: nginx-templates
          emptyDir: {}
        - name: nginx-entrypoint
          configMap:
            name: {{ include "ui.hostName" . }}-nginx
            defaultMode: 0755
            items:
              - key: resolver-from-resolvconf.sh
                path: 05-resolver-from-resolvconf.sh
      containers:
        - name: host
          image: {{ include "ui.hostImage" . | quote }}
          imagePullPolicy: {{ include "ui.hostImagePullPolicy" . }}
          ports:
            - name: http
              containerPort: {{ include "ui.hostPort" . }}
          env:
            - name: KACHO_UI_API_GATEWAY_UPSTREAM
              value: {{ .Values.host.upstreams.apiGateway | quote }}
            - name: KACHO_UI_KRATOS_PUBLIC_UPSTREAM
              value: {{ .Values.host.upstreams.kratosPublic | quote }}
            - name: KACHO_UI_HYDRA_PUBLIC_UPSTREAM
              value: {{ .Values.host.upstreams.hydraPublic | quote }}
            - name: KACHO_UI_KRATOS_UI_UPSTREAM
              value: {{ .Values.host.upstreams.kratosUi | quote }}
            - name: KACHO_UI_DASHBOARD_UPSTREAM
              value: {{ include "ui.dashboardUpstream" . | quote }}
            - name: KACHO_UI_VPC_UPSTREAM
              value: {{ include "ui.vpcUpstream" . | quote }}
            - name: KACHO_UI_IAM_UPSTREAM
              value: {{ include "ui.iamUpstream" . | quote }}
            - name: KACHO_UI_SYSTEM_UPSTREAM
              value: {{ include "ui.systemUpstream" . | quote }}
          volumeMounts:
            - name: nginx-template-src
              mountPath: /etc/nginx/templates-src/default.conf.template
              subPath: default.conf.template
              readOnly: true
            - name: nginx-templates
              mountPath: /etc/nginx/templates
            - name: nginx-entrypoint
              mountPath: /docker-entrypoint.d/05-resolver-from-resolvconf.sh
              subPath: 05-resolver-from-resolvconf.sh
              readOnly: true
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 30
          resources:
            {{- include "ui.hostResources" . | nindent 12 }}
