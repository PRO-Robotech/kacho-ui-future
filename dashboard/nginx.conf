server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Security headers (defense-in-depth for the image when run directly, i.e.
  # without the Helm configmap that renders ui.securityHeaders). Server-level
  # headers are inherited by `location /` (the HTML app, the clickjacking
  # surface). HSTS is intentionally omitted: the baked config also serves
  # dev-over-http and must not pin localhost to https — the TLS-terminated
  # Helm/ingress path adds Strict-Transport-Security. Kept in sync with the CSP
  # in deploy/values.yaml / deploy/templates/_helpers.tpl.
  add_header X-Frame-Options "DENY" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "no-referrer" always;
  add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self'; worker-src 'self' blob:; frame-ancestors 'none'; object-src 'none'; base-uri 'self'" always;

  location / {
    try_files $uri $uri/ /index.html;
  }

  location = /healthz {
    access_log off;
    add_header Content-Type text/plain;
    return 200 "ok\n";
  }

  # A location with its own add_header does not inherit the server-level ones,
  # so re-assert them here (nosniff matters for served JS/CSS in particular).
  # remoteEntry.js has a stable name but changes every build — it must revalidate,
  # else Module-Federation clients keep loading stale chunks (hashed chunks stay immutable).
  location ~* /remoteEntry\.js$ {
    try_files $uri =404;
    add_header Cache-Control "no-cache" always;
    add_header X-Content-Type-Options "nosniff" always;
  }

  location ~* \.(?:js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
    try_files $uri =404;
    expires 1y;
    add_header Cache-Control "public, immutable";
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self'; worker-src 'self' blob:; frame-ancestors 'none'; object-src 'none'; base-uri 'self'" always;
  }
}
