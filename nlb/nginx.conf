server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  location / {
    try_files $uri $uri/ /index.html;
  }

  location = /healthz {
    access_log off;
    add_header Content-Type text/plain;
    return 200 "ok\n";
  }

  # remoteEntry.js has a stable name but changes every build — it must revalidate,

  # else Module-Federation clients keep loading stale chunks (hashed chunks stay immutable).

  location ~* /remoteEntry\.js$ {

    try_files $uri =404;

    add_header Cache-Control "no-cache" always;

    add_header X-Content-Type-Options "nosniff" always;

  }


  location ~* \.(?:js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
    try_files $uri =404;
    expires 1y;
    add_header Cache-Control "public, immutable";
  }
}
